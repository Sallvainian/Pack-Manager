# .kanban/agents.yaml — Agent runtime registry (v1)
#
# Edit this file to add custom CLIs / SDKs / runtimes the project recognises,
# and to bind individual team-graph members to a specific runtime per machine.
#
# Schema: https://kanbanpro.app/schemas/agents-yaml-v1.json
# Generated by Kanban Pro — see docs/AGENTS_YAML.md.
version: 1
tier1Recognised:
  - id: claude
    name: Claude Code
    vendor: Anthropic
    bin: claude
    homepage: https://docs.anthropic.com/claude/docs/claude-code
    versionCommand:
      - claude
      - "--version"
    recommended: true
    recommendedOrder: 10
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.CLAUDE
    envVar: ANTHROPIC_API_KEY
    vendorAccent:
      color: "#d97757"
      logoText: C
      logoUrl: assets/tier1-cli/claude.png
    install:
      all:
        - npm install -g @anthropic-ai/claude-code
    notes: Requires `ANTHROPIC_API_KEY`. Best-of-class for surgical multi-file edits.
    resumeCapability:
      kind: flag
      flag: "--resume"
      argFrom: state.conversationId
      capture:
        pattern: "Session ID: ([a-f0-9-]{36})"
        target: state.conversationId
      onMissing: replay-as-context
  - id: codex
    name: OpenAI Codex
    vendor: OpenAI
    bin: codex
    homepage: https://github.com/openai/codex
    versionCommand:
      - codex
      - "--version"
    recommended: true
    recommendedOrder: 30
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.CODEX
    envVar: OPENAI_API_KEY
    vendorAccent:
      color: "#10a37f"
      logoText: ⌥
      logoUrl: assets/tier1-cli/codex.png
    install:
      all:
        - npm install -g @openai/codex
    notes: Requires `OPENAI_API_KEY`.
    resumeCapability:
      kind: unknown
      notes: >-
        Resume mechanism: `codex resume <uuid>` subcommand (not a flag). Session id format: UUID v4.
        Storage: ~/.codex/sessions/. Capture pattern pending field-verification — interactive
        startup banner not in public docs. Source: https://developers.openai.com/codex/cli/reference
  - id: cursor-agent
    name: Cursor Agent
    vendor: Cursor
    bin: cursor-agent
    homepage: https://cursor.com/cli
    versionCommand:
      - cursor-agent
      - "--version"
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.CURSOR_AGENT
    vendorAccent:
      color: "#ffffff"
      logoText: ⌘
      logoUrl: assets/tier1-cli/cursor-agent.png
    install:
      darwin:
        - curl https://cursor.com/install -fsS | bash
      linux:
        - curl https://cursor.com/install -fsS | bash
      win32:
        - "# See https://cursor.com/cli for Windows installation"
    notes: Ships with Cursor Desktop; the CLI binary is installed via the bootstrap script.
    resumeCapability:
      kind: unknown
      notes: >-
        Resume mechanism: `cursor-agent --resume <thread-id>` flag. Session id surfaces in
        `--output-format stream-json` as {"type":"start","session_id":"<uuid>"} but interactive
        plain-text format is undocumented. Capture pattern pending field-verification of interactive
        stdout. Source: https://cursor.com/docs/cli/using
  - id: aider
    name: aider
    vendor: community
    bin: aider
    homepage: https://aider.chat
    versionCommand:
      - aider
      - "--version"
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.AIDER
    vendorAccent:
      color: "#ef4444"
      logoText: a
      logoUrl: assets/tier1-cli/aider.png
    install:
      darwin:
        - brew install aider
        - "# Alt: python -m pip install aider-chat"
      linux:
        - python -m pip install aider-chat
      win32:
        - python -m pip install aider-chat
    notes: Supports many providers via `--model`. Plays well with git.
    resumeCapability:
      kind: implicit
  - id: amp
    name: Amp
    vendor: Sourcegraph
    bin: amp
    homepage: https://ampcode.com
    versionCommand:
      - amp
      - "--version"
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.AMP
    vendorAccent:
      color: "#06b6d4"
      logoText: A
      logoUrl: assets/tier1-cli/amp.png
    install:
      darwin:
        - curl -fsSL https://ampcode.com/install.sh | sh
      linux:
        - curl -fsSL https://ampcode.com/install.sh | sh
      win32:
        - iwr -useb https://ampcode.com/install.ps1 | iex
    notes: Sourcegraph's agentic CLI with strong codebase-search context.
    resumeCapability:
      kind: unknown
      notes: >-
        Resume mechanism: `amp threads continue <T-uuid>` subcommand. Thread id format: T-<uuid>.
        Threads sync to ampcode.com for cross-device continuity. Capture pattern pending
        field-verification of interactive stdout. Source: https://ampcode.com/manual
  - id: opencode
    name: OpenCode
    vendor: community
    bin: opencode
    homepage: https://opencode.ai
    versionCommand:
      - opencode
      - "--version"
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.OPENCODE
    vendorAccent:
      color: "#a855f7"
      logoText: O
      logoUrl: assets/tier1-cli/opencode.png
    install:
      darwin:
        - brew install sst/tap/opencode
        - "# Alt: npm install -g opencode-ai"
      linux:
        - npm install -g opencode-ai
      win32:
        - npm install -g opencode-ai
    notes: Open-source / provider-agnostic. Useful as a fallback runtime.
    resumeCapability:
      kind: unknown
      notes: >-
        Resume mechanism: `opencode run "<prompt>" --session <id>` or `opencode --continue`. Session
        id format: `ses_<base58>` (e.g. ses_2132323b6ffeuRlYHhPcU8DaZ6). Capture pattern pending
        field-verification of interactive TUI stdout. Source: https://opencode.ai/docs/cli/
  - id: agy
    name: Antigravity
    vendor: Google
    bin: agy
    homepage: https://antigravity.google/cli/
    versionCommand:
      - agy
      - "--version"
    recommended: true
    recommendedOrder: 25
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.AGY
    envVar: GEMINI_API_KEY
    vendorAccent:
      color: "#fbbf24"
      logoText: ⚡
      logoUrl: assets/tier1-cli/agy.png
    install:
      all:
        - npm install -g @google/antigravity
    notes: Google's agentic CLI. Authenticates via `GEMINI_API_KEY`.
    resumeCapability:
      kind: unknown
      notes: >-
        Confirm resume semantics against https://antigravity.google/cli/ when GA documentation
        lands.
  - id: omc
    name: oh-my-claudecode
    vendor: community
    bin: omc
    homepage: https://github.com/Yeachan-Heo/oh-my-claudecode
    versionCommand:
      - omc
      - "--version"
    recommended: false
    recommendedOrder: 50
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.OMC
    envVar: ANTHROPIC_API_KEY
    vendorAccent:
      color: "#a855f7"
      logoText: Ω
    install:
      all:
        - npm install -g oh-my-claude-sisyphus@latest
        - "# Or, inside Claude Code: /plugin install oh-my-claudecode"
        - "# Then: omc setup  (or  /setup  inside a Claude Code session)"
    notes: >-
      Multi-agent orchestrator (autopilot / team / ralph / ultrawork). Requires Claude Code on PATH.
      Cross-provider tmux workers spawn Codex panes when `omc team N:codex …` runs.
    dependsOn:
      - claude
    resumeCapability:
      kind: unknown
      notes: >-
        Architectural mismatch: OMC is a multi-agent orchestrator with N sub-shells in tmux panes.
        No single conversation-id surfaces in the orchestrator stdout. Resume would require per-pane
        session tracking, not a single regex over PTY output. Source:
        https://github.com/Yeachan-Heo/oh-my-claudecode/blob/main/docs/REFERENCE.md
  - id: goose
    name: Goose
    vendor: AAIF / Linux Foundation
    bin: goose
    homepage: https://goose-docs.ai/
    versionCommand:
      - goose
      - "--version"
    recommended: false
    recommendedOrder: 45
    description: TEAM_VIEW.HIRE_WIZARD.CLI_PICKER.DESCRIPTIONS.GOOSE
    vendorAccent:
      color: "#14b8a6"
      logoText: G
    install:
      darwin:
        - brew install pressly/tap/goose
      linux:
        - curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | bash
      win32:
        - "# See https://goose-docs.ai/docs/getting-started/installation/#windows"
    notes: >-
      Configure providers via `goose configure`. MCP-native; also available as a desktop app — the
      CLI is what Kanban Pro binds to.
    resumeCapability:
      kind: unknown
      notes: >-
        Resume mechanism present but undocumented startup banner. MCP-native; sessions stored
        locally. Capture pattern pending field-verification of interactive stdout. Sources:
        https://goose-docs.ai/ + https://github.com/block/goose
tier2Frameworks:
  - id: claude-agent-sdk
    name: Claude Agent SDK
    language: typescript
    homepage: https://docs.anthropic.com/claude/docs/agent-sdk
    install:
      all:
        - npm install @anthropic-ai/agent-sdk
  - id: openai-agents-sdk
    name: OpenAI Agents SDK
    language: typescript
    homepage: https://github.com/openai/openai-agents-js
    install:
      all:
        - npm install @openai/agents
  - id: vercel-ai-sdk
    name: Vercel AI SDK
    language: typescript
    homepage: https://sdk.vercel.ai
    install:
      all:
        - npm install ai
  - id: langchain-py
    name: LangChain (Python)
    language: python
    homepage: https://python.langchain.com
    install:
      all:
        - python -m pip install langchain
  - id: autogen
    name: AutoGen
    language: python
    homepage: https://microsoft.github.io/autogen/
    install:
      all:
        - python -m pip install pyautogen
  - id: openclaw
    name: OpenClaw
    language: typescript
    homepage: https://openclaw.ai
    repoUrl: https://github.com/openclaw/openclaw
    installKind: npm-global
    kanbanCompat: unknown
    mcpCompat: false
    install:
      all:
        - npm install -g openclaw@latest
        - "# Or: pnpm add -g openclaw@latest"
        - openclaw onboard --install-daemon
    notes: >-
      Multi-channel personal AI assistant (Gateway daemon model). Reads Kanban env vars only if the
      operator wires them into a prompt or skill.
    recommended: true
    recommendedOrder: 10
  - id: nanoclaw
    name: NanoClaw
    language: typescript
    homepage: https://nanoclaw.dev
    repoUrl: https://github.com/nanocoai/nanoclaw
    installKind: clone-from-repo
    kanbanCompat: unknown
    mcpCompat: false
    install:
      all:
        - git clone https://github.com/nanocoai/nanoclaw.git nanoclaw-v2
        - cd nanoclaw-v2
        - bash nanoclaw.sh
    notes: >-
      Container-isolated agents, designed to be forked + customised via Claude Code. Operators
      commonly clone into `agents/nanoclaw/` per the TK-13 subfolder convention.
    recommended: true
    recommendedOrder: 20
  - id: picoclaw
    name: PicoClaw
    language: go
    homepage: https://picoclaw.io
    repoUrl: https://github.com/sipeed/picoclaw
    installKind: binary-download
    kanbanCompat: unknown
    mcpCompat: true
    install:
      all:
        - "# Download the prebuilt binary from https://picoclaw.io"
        - "# (auto-detects your CPU arch — x86_64 / ARM64 / RISC-V / etc.)"
    notes: >-
      Ultra-light Go binary (<10MB RAM). Native MCP support. Designed for edge / low-power hardware
      but runs fine on a workstation.
    recommended: false
    recommendedOrder: 30
tier3Custom: []
memberBindings: []
syncRules:
  projectShared:
    - tier1Recognised
    - tier2Frameworks
    - tier3Custom
  machineLocal:
    - memberBindings
