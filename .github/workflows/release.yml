name: Release

# Builds, signs, and notarizes Pack-Manager.app (universal arm64 + x86_64),
# then packages it as a .dmg and .zip.
#
# - Called by release-please.yml (the normal path): builds and attaches the
#   artifacts to the GitHub Release release-please just published.
# - Run manually (Actions -> Release -> Run workflow): builds and uploads the
#   artifacts to the workflow run only; never touches a Release. Use to test.
#
# Signing/notarization degrade gracefully when the secrets are absent (e.g. on
# a fork): the build stays unsigned and un-notarized, and the job still
# succeeds.
#
# The cert is imported into a throwaway keychain here rather than letting the
# Tauri CLI do it (via APPLE_CERTIFICATE): tauri deletes its keychain right
# after the build, and the packaging step below may still need the identity to
# sign the .dmg. Tauri picks the identity up from APPLE_SIGNING_IDENTITY and
# signs (hardened runtime), notarizes, and staples the .app itself.
#
# Secrets used (same names as the Toddo and VisionPDF repos):
#   MAC_CSC_LINK          base64 of the Developer ID Application .p12
#                         (3DES-encrypted — macOS `security import` rejects
#                         OpenSSL 3's AES default)
#   MAC_CSC_KEY_PASSWORD  password for that .p12
#   APPLE_API_KEY         base64 of the App Store Connect API AuthKey_*.p8
#   APPLE_API_KEY_ID      key ID of that API key
#   APPLE_API_ISSUER      App Store Connect issuer ID
#
# Naming trap: Tauri's env contract wants the KEY ID in APPLE_API_KEY and the
# .p8 path in APPLE_API_KEY_PATH, while the repo secret APPLE_API_KEY holds
# the base64 .p8 content. The "Configure notarization" step maps between the
# two — don't "simplify" it.

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      attach_to_tag:
        description: 'Existing release tag to attach built assets to (release-please path). Empty for manual runs.'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    # ci.yml stays on stable macos-14 per DECISIONS D20; same here.
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On the release-please path the release commit is created DURING the
          # calling run, so `github.sha` still points at the commit that
          # triggered it — one BEFORE the version bump. Checking that out makes
          # "Resolve version" below correctly refuse to build, because
          # tauri.conf.json still holds the previous version while the tag is
          # the new one. Check out the tag itself; fall back to the default ref
          # for manual `workflow_dispatch` runs, which pass no tag.
          ref: ${{ inputs.attach_to_tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm ci
        run: npm ci

      # src-tauri/tauri.conf.json is the version the bundle ships with;
      # release-please keeps package.json and Cargo.toml in lockstep with it.
      # On the release-please path, refuse to ship a mislabeled build: the tag
      # must match.
      - name: Resolve version
        shell: bash
        env:
          ATTACH_TO_TAG: ${{ inputs.attach_to_tag }}
        run: |
          set -o pipefail
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse version from src-tauri/tauri.conf.json (got '$VERSION')"; exit 1
          fi
          for f in package.json; do
            OTHER=$(jq -r .version "$f")
            if [ "$OTHER" != "$VERSION" ]; then
              echo "::error::$f version ($OTHER) does not match tauri.conf.json ($VERSION)"; exit 1
            fi
          done
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' src-tauri/Cargo.toml | head -1)
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tauri.conf.json ($VERSION)"; exit 1
          fi
          if [ -n "$ATTACH_TO_TAG" ] && [ "v$VERSION" != "$ATTACH_TO_TAG" ]; then
            echo "::error::Tag $ATTACH_TO_TAG does not match tauri.conf.json (v$VERSION)"; exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building Pack-Manager $VERSION"

      # Import the Developer ID cert into a throwaway keychain and hand tauri
      # the identity name. No-op (unsigned build) when the secret is absent.
      - name: Import Developer ID certificate
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          set -o pipefail
          if [ -z "$MAC_CSC_LINK" ]; then
            echo "SIGNED=false" >> "$GITHUB_ENV"
            echo "No MAC_CSC_LINK secret -> unsigned build."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$MAC_CSC_LINK" | tr -d '[:space:]' | openssl base64 -d -A > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN" | grep -q "Developer ID Application" \
            || { echo "::error::No Developer ID Application identity found after import"; exit 1; }
          echo "APPLE_SIGNING_IDENTITY=Developer ID Application: Frank Cottone (W778837A9L)" >> "$GITHUB_ENV"
          echo "SIGNED=true" >> "$GITHUB_ENV"

      # Tauri notarizes when APPLE_API_KEY (key ID), APPLE_API_ISSUER and
      # APPLE_API_KEY_PATH (.p8 file) are exported; notarytool needs the key
      # as a FILE — decode the base64 secret to disk and validate it.
      - name: Configure notarization
        shell: bash
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -o pipefail
          if [ "$SIGNED" = "true" ] && [ -n "$APPLE_API_KEY_B64" ]; then
            printf '%s' "$APPLE_API_KEY_B64" | tr -d '[:space:]' | openssl base64 -d -A > "$RUNNER_TEMP/AuthKey.p8"
            if ! grep -q "BEGIN PRIVATE KEY" "$RUNNER_TEMP/AuthKey.p8"; then
              echo "::error::Decoded APPLE_API_KEY is not a valid .p8 — check the secret is base64 of the AuthKey_*.p8 file"; exit 1
            fi
            {
              echo "APPLE_API_KEY=$APPLE_API_KEY_ID"
              echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_ID"
              echo "NOTARIZE=true"
            } >> "$GITHUB_ENV"
          else
            echo "NOTARIZE=false" >> "$GITHUB_ENV"
            echo "Signing disabled or no APPLE_API_KEY secret -> build will be un-notarized."
          fi

      # beforeBuildCommand (npm run build) compiles the frontend, then tauri
      # compiles both arches, lipo-merges, signs with APPLE_SIGNING_IDENTITY,
      # and (when the APPLE_API_* env vars are set) notarizes and staples the
      # .app before packaging the .dmg.
      #
      # TAURI_SIGNING_PRIVATE_KEY is the updater's minisign key — unrelated to
      # the Apple Developer ID above. `bundle.createUpdaterArtifacts` in
      # tauri.conf.json makes this build also emit Pack-Manager.app.tar.gz and
      # its detached .sig; without the key present, that step fails the build.
      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target universal-apple-darwin

      # Normalize artifact names into dist/ and make sure every artifact
      # carries a notarization ticket, re-notarizing whatever tauri didn't
      # cover. Also emits the updater archive + latest.json.
      - name: Package
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Set on the release-please path only; latest.json then carries the
          # changelog release-please wrote. Empty on manual runs.
          RELEASE_TAG: ${{ inputs.attach_to_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          notarize() {
            # `if !` keeps errexit from killing the function before we can
            # fetch the notarization log — the one artifact that explains a
            # failed submission.
            local file="$1" out id status
            if ! out=$(xcrun notarytool submit "$file" \
              --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" \
              --wait --output-format json); then
              out="${out:-}"
            fi
            echo "$out"
            id=$(echo "$out" | jq -r '.id // empty' 2>/dev/null || true)
            status=$(echo "$out" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "$status" != "Accepted" ]; then
              echo "::error::Notarization of $file failed with status: ${status:-<no status returned>}"
              if [ -n "$id" ]; then
                xcrun notarytool log "$id" \
                  --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" || true
              fi
              return 1
            fi
          }
          ensure_stapled() {
            local target="$1"
            xcrun stapler validate "$target" >/dev/null 2>&1 && return 0
            # A ticket may already exist from tauri's own notarization pass.
            xcrun stapler staple "$target" >/dev/null 2>&1 && return 0
            if [ -d "$target" ]; then
              ditto -c -k --keepParent "$target" "$RUNNER_TEMP/notarize-upload.zip"
              notarize "$RUNNER_TEMP/notarize-upload.zip"
            else
              notarize "$target"
            fi
            xcrun stapler staple "$target"
          }

          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          APP="$BUNDLE_DIR/macos/Pack-Manager.app"
          [ -d "$APP" ] || { echo "::error::$APP not found after build"; exit 1; }
          shopt -s nullglob
          dmgs=("$BUNDLE_DIR"/dmg/*.dmg)
          if [ ${#dmgs[@]} -ne 1 ]; then
            echo "::error::Expected exactly one .dmg in $BUNDLE_DIR/dmg, found ${#dmgs[@]}"; exit 1
          fi
          mkdir -p dist
          cp "${dmgs[0]}" "dist/Pack-Manager-$VERSION.dmg"
          if [ "$SIGNED" = "true" ] && ! codesign --verify "dist/Pack-Manager-$VERSION.dmg" >/dev/null 2>&1; then
            codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp "dist/Pack-Manager-$VERSION.dmg"
          fi
          if [ "$NOTARIZE" = "true" ]; then
            ensure_stapled "$APP"
            ensure_stapled "dist/Pack-Manager-$VERSION.dmg"
          fi
          # Zip AFTER stapling so the ticket ships inside the archive.
          ditto -c -k --keepParent "$APP" "dist/Pack-Manager-$VERSION.zip"
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

          # --- Updater archive -------------------------------------------
          # The bundler wrote Pack-Manager.app.tar.gz + .sig during the build,
          # i.e. potentially BEFORE `ensure_stapled` ran above. Whether the
          # archived .app already carries a ticket is a bundler-ordering
          # detail we refuse to assume: verify, and rebuild + re-sign from the
          # stapled bundle if not. An un-stapled auto-update would install an
          # app that has to phone Apple on first launch.
          tarballs=("$BUNDLE_DIR"/macos/*.app.tar.gz)
          if [ ${#tarballs[@]} -ne 1 ]; then
            echo "::error::Expected exactly one .app.tar.gz in $BUNDLE_DIR/macos, found ${#tarballs[@]} — is bundle.createUpdaterArtifacts still true?"; exit 1
          fi
          UPDATER_TGZ="dist/Pack-Manager-$VERSION.app.tar.gz"
          cp "${tarballs[0]}" "$UPDATER_TGZ"
          cp "${tarballs[0]}.sig" "$UPDATER_TGZ.sig"

          if [ "$NOTARIZE" = "true" ]; then
            probe="$RUNNER_TEMP/updater-probe"
            rm -rf "$probe"; mkdir -p "$probe"
            tar xzf "$UPDATER_TGZ" -C "$probe"
            if xcrun stapler validate "$probe/Pack-Manager.app" >/dev/null 2>&1; then
              echo "Updater archive already carries a notarization ticket."
            else
              echo "Updater archive is not stapled -> repackaging from the stapled bundle."
              tar czf "$UPDATER_TGZ" -C "$BUNDLE_DIR/macos" "Pack-Manager.app"
              # Reads the key from TAURI_SIGNING_PRIVATE_KEY{,_PASSWORD};
              # writes the detached signature to <file>.sig.
              rm -f "$UPDATER_TGZ.sig"
              npx tauri signer sign "$UPDATER_TGZ"
              [ -s "$UPDATER_TGZ.sig" ] || { echo "::error::re-signing produced no $UPDATER_TGZ.sig"; exit 1; }
            fi
            rm -rf "$probe"
          fi

          # latest.json — the updater endpoint. Both darwin targets point at
          # the single universal archive: tauri-plugin-updater resolves its
          # target from `cfg!(target_arch)`, so the running slice of the fat
          # binary reports darwin-aarch64 on Apple Silicon and darwin-x86_64
          # on Intel.
          SIGNATURE=$(cat "$UPDATER_TGZ.sig")
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v$VERSION/Pack-Manager-$VERSION.app.tar.gz"
          RELEASE_NOTES=""
          if [ -n "$RELEASE_TAG" ]; then
            RELEASE_NOTES=$(gh release view "$RELEASE_TAG" --json body -q .body 2>/dev/null || true)
          fi
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "$RELEASE_NOTES" \
            --arg sig "$SIGNATURE" \
            --arg url "$ASSET_URL" \
            '{version: $version, notes: $notes, pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {signature: $sig, url: $url},
                "darwin-x86_64":  {signature: $sig, url: $url}
              }}' > dist/latest.json
          echo "latest.json:"; cat dist/latest.json

      # Prove what we're about to ship passes Gatekeeper before uploading it.
      - name: Verify signature & notarization
        shell: bash
        run: |
          set -o pipefail
          if [ "$SIGNED" != "true" ]; then
            echo "Unsigned build -> skipping Gatekeeper verification."
            exit 0
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if [ "$NOTARIZE" = "true" ]; then
            spctl --assess --type execute --verbose "$APP_PATH"
            spctl --assess --type open --context context:primary-signature --verbose "dist/Pack-Manager-$VERSION.dmg"
          fi

      # release-please path: attach the artifacts to the release release-please
      # created for this tag.
      - name: Attach assets to release (release-please)
        if: inputs.attach_to_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTACH_TO_TAG: ${{ inputs.attach_to_tag }}
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.zip dist/*.app.tar.gz dist/*.app.tar.gz.sig dist/latest.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No build artifacts found in dist/ to upload"; exit 1
          fi
          printf 'Uploading %s\n' "${files[@]}"
          gh release upload "$ATTACH_TO_TAG" "${files[@]}" --clobber

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pack-manager-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
