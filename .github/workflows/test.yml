# Playwright browser tests.
#
# The existing ci.yml remains responsible for Rust, application TypeScript,
# Vitest, the production web build, and the Tauri build smoke test.

name: Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly flaky-test detection on Sunday at 02:00 UTC.
    - cron: "0 2 * * 0"

permissions:
  contents: read

concurrency:
  # Keep scheduled burn-in independent from normal pushes to main.
  group: playwright-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # No ESLint script currently exists. This checks the Playwright TypeScript
  # files, which the existing ci.yml web job does not include.
  lint:
    name: E2E validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Playwright tests
        run: npm run test:e2e:typecheck

      - name: Verify Playwright discovery
        run: npm run test:e2e -- --list

  test:
    name: E2E (Shard ${{ matrix.shard }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: ["1/2", "2/2"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        run: npm run test:e2e:install:ci

      - name: Run Playwright shard
        run: >-
          npm run test:e2e --
          --shard="${{ matrix.shard }}"
          --reporter=blob
          --fail-on-flaky-tests

      - name: Upload mergeable Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-blob-${{ strategy.job-index }}
          path: blob-report/
          if-no-files-found: error
          retention-days: 7

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure-${{ strategy.job-index }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7

  burn-in:
    name: Burn-in (10 passes)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        run: npm run test:e2e:install:ci

      - name: Repeat all browser tests without retries
        run: npm run test:e2e -- --repeat-each=10 --retries=0

      - name: Upload burn-in failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-burn-in-failure
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7

  report:
    name: Test report
    if: ${{ always() && !cancelled() }}
    needs: [lint, test, burn-in]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download shard reports
        id: download-reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: playwright-blob-*
          path: all-blob-reports
          merge-multiple: true

      - name: Validate shard reports
        run: |
          report_count="$(find all-blob-reports -type f -name '*.zip' | wc -l | tr -d ' ')"
          if [ "$report_count" -ne 2 ]; then
            echo "::error title=Incomplete Playwright reports::Expected exactly 2 blob-report zip files, found $report_count."
            find all-blob-reports -type f -print
            exit 1
          fi

      - name: Merge Playwright reports
        if: steps.download-reports.outcome == 'success'
        run: >-
          npx playwright merge-reports
          --config=playwright.config.ts
          all-blob-reports

      - name: Upload merged HTML and JUnit reports
        if: ${{ always() && steps.download-reports.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/results.xml
          if-no-files-found: error
          retention-days: 30

      - name: Publish run summary
        if: always()
        env:
          TYPECHECK_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BURN_IN_RESULT: ${{ needs.burn-in.result }}
        run: |
          {
            echo "## Playwright test summary"
            echo
            echo "- E2E validation: $TYPECHECK_RESULT"
            echo "- Browser shards: $TEST_RESULT"
            echo "- Burn-in: $BURN_IN_RESULT"
            echo "- Required result: every validation, browser shard, and applicable burn-in job must pass"
            echo "- Reports and failure evidence: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce quality gate
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          TYPECHECK_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BURN_IN_RESULT: ${{ needs.burn-in.result }}
        run: |
          if [ "$TYPECHECK_RESULT" != "success" ]; then
            echo "::error title=Playwright quality gate failed::E2E validation did not pass ($TYPECHECK_RESULT). See $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            exit 1
          fi

          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error title=Playwright quality gate failed::Browser shards did not pass ($TEST_RESULT). See $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            exit 1
          fi

          if { [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "schedule" ]; } && [ "$BURN_IN_RESULT" != "success" ]; then
            echo "::error title=Playwright quality gate failed::Required burn-in did not pass ($BURN_IN_RESULT). See $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            exit 1
          fi
